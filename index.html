<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Institutional Trading Intelligence Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-tertiary: #1f2937;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent-bullish: #00dc82;
      --accent-bearish: #ff4757;
      --accent-blue: #3b82f6;
      --accent-amber: #f59e0b;
      --border: #1e293b;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #app {
      display: grid;
      grid-template-rows: 48px 1fr 280px;
      grid-template-columns: 1fr 320px;
      height: 100vh;
      gap: 1px;
      background: var(--border);
    }

    /* Header */
    .header {
      grid-column: 1 / -1;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .header .controls {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    .btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--bg-primary); color: var(--text-primary); }
    .btn.active { border-color: var(--accent-blue); color: var(--accent-blue); }

    .symbol-badge {
      background: var(--bg-tertiary);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-blue);
    }

    .bias-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .bias-badge.bullish { background: rgba(0, 220, 130, 0.15); color: var(--accent-bullish); }
    .bias-badge.bearish { background: rgba(255, 71, 87, 0.15); color: var(--accent-bearish); }
    .bias-badge.neutral { background: rgba(148, 163, 184, 0.15); color: var(--text-secondary); }

    /* Chart area */
    .chart-container {
      position: relative;
      background: var(--bg-primary);
      overflow: hidden;
    }

    /* Right panel */
    .right-panel {
      grid-row: 2 / 4;
      background: var(--bg-secondary);
      overflow-y: auto;
      padding: 12px;
    }

    .panel-section {
      margin-bottom: 16px;
    }

    .panel-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    /* Bottom panel */
    .bottom-panel {
      background: var(--bg-secondary);
      overflow-y: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Alert items */
    .alert-item {
      padding: 8px;
      border-radius: 4px;
      background: var(--bg-tertiary);
      border-left: 3px solid var(--accent-blue);
      margin-bottom: 6px;
      font-size: 11px;
    }
    .alert-item.bullish { border-left-color: var(--accent-bullish); }
    .alert-item.bearish { border-left-color: var(--accent-bearish); }

    .alert-item .alert-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .alert-item .alert-type { font-weight: 600; color: var(--text-primary); }
    .alert-item .alert-confidence { color: var(--accent-amber); }
    .alert-item .alert-msg { color: var(--text-secondary); }

    /* AI Analysis panel */
    .ai-card {
      background: var(--bg-tertiary);
      border-radius: 6px;
      padding: 12px;
      border: 1px solid var(--border);
    }

    .ai-card .score {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-bullish);
    }

    .ai-card .entry-info {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .ai-card .entry-info div {
      text-align: center;
      padding: 4px;
      border-radius: 4px;
      background: var(--bg-primary);
    }

    .ai-card .entry-info .label {
      font-size: 9px;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .ai-card .entry-info .value {
      font-size: 12px;
      font-weight: 600;
      font-family: monospace;
    }

    .entry-value { color: var(--accent-bullish); }
    .sl-value { color: var(--accent-bearish); }
    .tp-value { color: var(--accent-blue); }

    /* FPS counter */
    .fps-counter {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 10px;
      color: var(--text-secondary);
      font-family: monospace;
      z-index: 100;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Institutional Trading Intelligence</h1>
      <span class="symbol-badge" id="symbol-display">EURUSD</span>
      <span class="btn active" id="tf-display">M15</span>
      <span class="bias-badge neutral" id="bias-display">NEUTRAL</span>
      <div class="controls">
        <button class="btn" id="btn-replay">▶ Replay</button>
        <button class="btn" id="btn-scan">⚡ Scan</button>
        <button class="btn" id="btn-template">📋 Template</button>
      </div>
    </header>

    <div class="chart-container" id="chart-container">
      <div class="fps-counter" id="fps-counter">-- FPS</div>
    </div>

    <div class="right-panel">
      <div class="panel-section">
        <h3>AI Analysis</h3>
        <div class="ai-card" id="ai-panel">
          <div style="color: var(--text-secondary); font-size: 11px;">
            Analyzing market conditions...
          </div>
        </div>
      </div>

      <div class="panel-section">
        <h3>Active Setups</h3>
        <div id="setups-panel"></div>
      </div>

      <div class="panel-section">
        <h3>Scanner Alerts</h3>
        <div id="alerts-panel"></div>
      </div>
    </div>

    <div class="bottom-panel">
      <div class="panel-section">
        <h3>Market Structure</h3>
        <div id="structure-panel"></div>
      </div>
      <div class="panel-section">
        <h3>Liquidity Map</h3>
        <div id="liquidity-panel"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
  <script type="module">
    import { InstitutionalTradingPlatform } from '/src/main.ts';

    // Initialize platform
    const platform = new InstitutionalTradingPlatform({
      symbol: 'EURUSD',
      timeframe: 'M15',
      template: 'INTRADAY_15M',
      autoAnalyze: true,
      autoScan: true,
    });

    const container = document.getElementById('chart-container');
    platform.initialize(container).then(() => {
      console.log('Platform ready');
      updateUI();
    });

    // UI update loop
    function updateUI() {
      const stats = platform.getStats();
      
      document.getElementById('fps-counter').textContent = `${stats.fps} FPS`;
      document.getElementById('bias-display').textContent = stats.bias;
      document.getElementById('bias-display').className = `bias-badge ${stats.bias.toLowerCase()}`;

      // Update AI panel
      const ai = platform.getAIAnalysis();
      if (ai) {
        document.getElementById('ai-panel').innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <span class="score">${ai.confidenceScore}%</span>
            <span style="font-size: 11px; color: var(--text-secondary);">${ai.setupType.replace(/_/g, ' ')}</span>
          </div>
          <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 8px;">${ai.explanation.slice(0, 120)}...</div>
          <div class="entry-info">
            <div><div class="label">Entry</div><div class="value entry-value">${ai.entry.toFixed(5)}</div></div>
            <div><div class="label">Stop Loss</div><div class="value sl-value">${ai.stopLoss.toFixed(5)}</div></div>
            <div><div class="label">R:R</div><div class="value tp-value">${ai.riskReward.toFixed(1)}</div></div>
          </div>
        `;
      }

      // Update alerts
      const alerts = platform.getAlerts().slice(-5);
      document.getElementById('alerts-panel').innerHTML = alerts.map(a => `
        <div class="alert-item ${a.direction.toLowerCase()}">
          <div class="alert-header">
            <span class="alert-type">${a.type}</span>
            <span class="alert-confidence">${a.confidence}%</span>
          </div>
          <div class="alert-msg">${a.message}</div>
        </div>
      `).join('');

      requestAnimationFrame(updateUI);
    }

    // Button handlers
    document.getElementById('btn-replay').addEventListener('click', () => {
      if (platform.getStats().isReplayActive) {
        platform.stopReplay();
      } else {
        platform.startReplay(0, 2);
      }
    });

    document.getElementById('btn-scan').addEventListener('click', () => {
      platform.runSMTScan(['EURUSD', 'GBPUSD', 'USDJPY', 'XAUUSD'], 'M15');
    });
  </script>
</body>
</html>
