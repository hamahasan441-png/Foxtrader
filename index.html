<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080b12">
  <meta name="color-scheme" content="dark light">
  <meta name="description" content="FoxTrader — Institutional AI Trading Intelligence">
  <title>FoxTrader</title>

  <!-- Preload critical fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <!-- Fox Design System -->
  <link rel="stylesheet" href="/src/design/fox-theme.css">
  <link rel="stylesheet" href="/src/design/components.css">
</head>
<body>
  <!-- ====================================================================
       FOXTRADER — Institutional Trading Interface
       Layout: Header + Chart (dominant) + optional sidebar/bottom panels
       Every pixel has purpose. Premium. Minimal. Fast.
       ==================================================================== -->

  <div id="app" class="fox-app">

    <!-- ================================================================
         HEADER — Symbol, Timeframe, Bias, Controls
         ================================================================ -->
    <header class="fox-header">
      <span class="fox-header__logo">Fox<span style="color:var(--fox-text-secondary);font-weight:400">Trader</span></span>
      <span class="fox-header__divider"></span>

      <!-- Symbol Badge -->
      <span class="fox-badge fox-badge--symbol" id="fox-symbol">EURUSD</span>

      <!-- Timeframe -->
      <span class="fox-badge fox-badge--timeframe" id="fox-timeframe">M15</span>

      <!-- Bias Indicator -->
      <span class="fox-badge fox-badge--neutral" id="fox-bias">NEUTRAL</span>

      <!-- Spacer -->
      <span style="flex:1"></span>

      <!-- Controls -->
      <button class="fox-btn" id="fox-btn-analyze" title="Run AI Analysis">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Analyze
      </button>
      <button class="fox-btn" id="fox-btn-theme" title="Toggle Theme">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>

      <!-- FPS Counter -->
      <span class="fox-badge fox-badge--timeframe fox-mono" id="fox-fps" style="min-width:52px;text-align:center">-- fps</span>
    </header>

    <!-- ================================================================
         MAIN CONTENT — Chart dominates the viewport
         ================================================================ -->
    <main class="fox-chart-container" id="fox-chart">
      <!-- WebGL canvas injected here by FoxChart -->
    </main>

  </div>

  <!-- ====================================================================
       APPLICATION BOOTSTRAP
       ==================================================================== -->
  <script type="module">
    import { FoxChart } from '/src/engine/webgl/fox-chart.ts';
    import { scheduler } from '/src/engine/scheduler.ts';

    // ---- Initialize Chart ----
    const chartContainer = document.getElementById('fox-chart');
    const chart = new FoxChart(chartContainer);

    // ---- Generate sample data (1M candles for stress test) ----
    function generateCandles(count) {
      const candles = [];
      let price = 1.10000;
      const baseTime = Date.now() - count * 60000;

      for (let i = 0; i < count; i++) {
        const volatility = 0.0003 + Math.random() * 0.0004;
        const change = (Math.random() - 0.48) * volatility;
        const open = price;
        const close = price + change;
        const high = Math.max(open, close) + Math.random() * volatility * 0.6;
        const low = Math.min(open, close) - Math.random() * volatility * 0.6;
        const volume = Math.random() * 800 + 200;

        candles.push({ timestamp: baseTime + i * 60000, open, high, low, close, volume });
        price = close;
      }
      return candles;
    }

    // Load 100K candles (demonstrates millions-capable engine)
    const candles = generateCandles(100000);
    chart.setData(candles);

    // ---- FPS Display (via unified scheduler) ----
    const fpsEl = document.getElementById('fox-fps');
    scheduler.register('fps-display', 'LOW', () => {
      fpsEl.textContent = `${chart.getFPS()} fps`;
    });
    scheduler.start();

    // ---- Theme Toggle ----
    document.getElementById('fox-btn-theme').addEventListener('click', () => {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    });

    // ---- Bias Badge ----
    const biasEl = document.getElementById('fox-bias');
    // Simulated bias (in real app, comes from agent orchestrator)
    const biases = ['BULLISH', 'BEARISH', 'NEUTRAL'];
    const biasClasses = { BULLISH: 'fox-badge--bullish', BEARISH: 'fox-badge--bearish', NEUTRAL: 'fox-badge--neutral' };
    let biasIdx = 0;
    document.getElementById('fox-btn-analyze').addEventListener('click', () => {
      biasIdx = (biasIdx + 1) % 3;
      const bias = biases[biasIdx];
      biasEl.textContent = bias;
      biasEl.className = `fox-badge ${biasClasses[bias]}`;
    });

    // ---- Simulate real-time candle feed ----
    let lastCandle = candles[candles.length - 1];
    setInterval(() => {
      const change = (Math.random() - 0.48) * 0.0003;
      lastCandle = {
        timestamp: lastCandle.timestamp + 60000,
        open: lastCandle.close,
        close: lastCandle.close + change,
        high: Math.max(lastCandle.close, lastCandle.close + change) + Math.random() * 0.0001,
        low: Math.min(lastCandle.close, lastCandle.close + change) - Math.random() * 0.0001,
        volume: Math.random() * 500 + 100,
      };
      chart.addCandle(lastCandle);
    }, 1000);

    console.log('[FoxTrader] Initialized — 100K candles loaded, WebGL2 rendering active');
  </script>
</body>
</html>
