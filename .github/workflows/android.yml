name: Android CI — Build APK

# ============================================================================
# FOXTRADER — Android build pipeline
# Builds a real debug APK on GitHub's runners (which have the Android SDK +
# network) and uploads it as a downloadable artifact. This is the verifiable
# path to an installable APK.
# ============================================================================

on:
  push:
    branches: [ main, "feat/**", "fix/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Allow manual trigger from the Actions tab

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        # Uses the committed Gradle wrapper (gradlew + gradle-wrapper.jar).
        # Enables Gradle dependency + build caching keyed off the wrapper.

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon --no-configuration-cache

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: foxtrader-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace --no-daemon --no-configuration-cache

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/
          retention-days: 7
